name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.HETZNER_USER }}/backend

            # Write .env (GHA substitutes secrets before sending script over SSH)
            cat > /home/${{ secrets.HETZNER_USER }}/backend/.env << 'ENVEOF'
            NODE_ENV=production
            HOST=0.0.0.0
            PORT=8080
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_URL_RO=${{ secrets.DATABASE_URL_RO }}
            ENVEOF
            chmod 600 /home/${{ secrets.HETZNER_USER }}/backend/.env

            # Authenticate and pull latest image
            echo "${{ secrets.GHCR_PAT }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest

            # Replace running container
            docker stop backend || true
            docker rm backend || true
            docker run -d \
              --name backend \
              --restart unless-stopped \
              --env-file /home/${{ secrets.HETZNER_USER }}/backend/.env \
              -p 8080:8080 \
              ghcr.io/${{ github.repository }}:latest
